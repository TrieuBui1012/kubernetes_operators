# This rule is not used by the project visitors-helm-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over example.trieubui1012.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: visitors-helm-operator
    app.kubernetes.io/managed-by: kustomize
  name: visitorapp-admin-role
rules:
- apiGroups:
  - example.trieubui1012.com
  resources:
  - visitorapps
  verbs:
  - '*'
- apiGroups:
  - example.trieubui1012.com
  resources:
  - visitorapps/status
  verbs:
  - get
