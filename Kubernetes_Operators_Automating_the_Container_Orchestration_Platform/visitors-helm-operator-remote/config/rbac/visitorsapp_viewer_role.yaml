# This rule is not used by the project visitors-helm-operator-remote itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to example.mycompany.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: visitors-helm-operator-remote
    app.kubernetes.io/managed-by: kustomize
  name: visitorsapp-viewer-role
rules:
- apiGroups:
  - example.mycompany.com
  resources:
  - visitorsapps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - example.mycompany.com
  resources:
  - visitorsapps/status
  verbs:
  - get
